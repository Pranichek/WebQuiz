<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="{{ url_for('static', filename= 'css/base_passing.css') }}">
        <title>Сторінка проходження студента</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="{{ url_for('test_pass.static', filename = 'css/passing_test.css') }}">
        <link rel="stylesheet" href="{{ url_for('mentor.static', filename = 'css/side_menu.css') }}">
    </head>
    <body>
        <audio id="correct-sound" src="{{ url_for('test_pass.static', filename='audio/right.mp3') }}" preload="auto"></audio>
        <audio id="incorrect-sound" src="{{ url_for('test_pass.static', filename='audio/false.mp3') }}" preload="auto"></audio>

        <main class="main">

        </main>

        <script src="https://cdn.socket.io/4.3.2/socket.io.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

        <script>
            <!-- ОДИИИИН сокет на все страницы -->
            window.socket = io(); 
        </script>

        <script type="module" src="{{ url_for('mentor.static', filename='js/recconect.js') }}"></script>
        <script type="module" src="{{ url_for('mentor.static', filename='js/student_code/student_lobby.js') }}"></script>
        <script src="{{ url_for('mentor.static', filename='js/side_menu.js') }}"></script>


        <script type="module">
            let state = localStorage.getItem("check");
            import { loadLobby, loadPassingStudent } from "{{ url_for('mentor.static', filename='js/student_code/student_lobby.js') }}";

            if (!state){
                localStorage.setItem("check", "lobby_page");
                state = "lobby_page";
            }

            if (state == "lobby_page"){
                loadLobby();
            }else if(state == "passing_page"){
                loadPassingStudent();
            }
        </script>


    </body>
</html>
