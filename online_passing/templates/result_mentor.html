{% extends 'base.html' %}

{% block links %}
    <link rel="stylesheet" href="{{ url_for('student.static', filename='css/mentor_result.css') }}">
    <link rel="stylesheet" href="{{ url_for('mentor.static', filename = 'css/side_menu.css') }}">
{% endblock links %}

{% block content %}
    <div class="main-part">
        <div class="open-menu" id="openMenuBtn">
            <img src="{{ url_for('student.static', filename = 'images/click.svg') }}" alt="">
        </div>

       <div class="top-diagrams">
            <div class="circle-diagram">

            </div>
            <div class="column-diagram">

            </div>
       </div>
       <div class="bottom-diagrams">
            <div class="by-answer">

            </div>
       </div>
    </div>
    <div class="side-menu">
        <button class="close-menu" id="closeMenuBtn">&times;</button>
        

        <div class="participants-section">
            <div class="section-header">
                <div class="questions">
                    <span>ПИТАННЯ</span>
                    <span class="questions-mentor">5/10</span>
                </div>
                <div class="count-people">
                    <span class="title">УЧАСНИКИ</span>
                    <span class="count text-people">0/0</span>
                </div>
            </div>
            
            <div class="divider"></div>

            <div class="table-data">
                <p class="place-part">місце</p>
                <div class="line-table"></div>
                <p class="full-name">ПІБ</p>
                <div class="line-table"></div>
                <p class="accuracy-part">%</p>
                <div class="line-table"></div>
                <p class="points-part">бали</p>
            </div>

            <div class="divider"></div>

            <div class="users-list-container outline-users">

            </div>
        </div>

        <div class="controls-section">
            <button class="view-answers-btn check-answers end-test open-modal-btn">
                Завершити тест
            </button>
            <button class="view-answers-btn check-answers next-question">
                Наступне питання
            </button>
        </div>
    </div>

    <div class="window-end">
        <h1>Закінчення тесту</h1>
        <p>Ви впевнені, що хочете примусово закінчити тест?</p>
        <div>
            <p class="decline-ending">Скасувати</p>
            <p class="end_test">Завершити</p>
        </div>
    </div>
{% endblock content %}

{% block scripts %}
    {{ super() }}
    
    <script src="{{ url_for('mentor.static', filename='js/mentor_result.js') }}"></script>
    <script src="{{ url_for('mentor.static', filename='js/recconect.js') }}"></script>
    <script src="{{ url_for('mentor.static', filename='js/end_test.js') }}"></script> 
    <script src="{{ url_for('mentor.static', filename='js/side_menu.js') }}"></script>
{% endblock %}
